<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>

<h1>Expense Tracker</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Expense name" required>
    <input type="number" name="amount" placeholder="Amount" required>
    <button type="submit">Add</button>
</form>

<hr>

<h2>Expenses</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Amount</th>
</tr>

{% for exp in expenses %}
<tr>
    <td>{{ exp.name }}</td>
    <td>{{ exp.amount }}</td>
</tr>
{% endfor %}

</table>

<h3>Total: {{ total }}</h3>

</body>
</html>
